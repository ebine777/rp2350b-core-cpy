name: Build CircuitPython for RP2350B Core

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BOARD: weact_rp2350b_core

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 python3-pip cmake ninja-build
          pip3 install cascadetoml

      - name: Clone CircuitPython
        run: |
          git clone https://github.com/adafruit/circuitpython.git
          cd circuitpython
          git submodule update --init --recursive

      - name: Copy custom board definition
        run: |
          cp -r ports/raspberrypi/boards/${BOARD} \
                circuitpython/ports/raspberrypi/boards/

      - name: Ensure boot_stage2 directory exists
        run: |
          mkdir -p circuitpython/ports/raspberrypi/boards/boot_stage2

      - name: Copy RP2350B boot_stage2 template
        run: |
          cp ports/raspberrypi/boards/${BOARD}/boot_stage2_rp2350b.c.jinja \
             circuitpython/ports/raspberrypi/boards/boot_stage2/

      - name: Build CircuitPython
        run: |
          cd circuitpython/ports/raspberrypi
          make BOARD=${BOARD} -j$(nproc)

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: circuitpython-uf2
          path: circuitpython/ports/raspberrypi/build-${BOARD}/firmware.uf2